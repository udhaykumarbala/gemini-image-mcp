openapi: 3.0.3
info:
  title: Nano Banana MCP — Tool API Reference
  description: |
    OpenAPI reference for the 5 MCP tools exposed by the Nano Banana image generation server.
    Each tool is represented as a POST endpoint. In practice these are invoked over the
    Model Context Protocol (stdio transport), not HTTP — this spec serves as machine-readable
    documentation only.
  version: "1.0.0"

servers:
  - url: mcp://nanobanana
    description: MCP server (stdio transport)

tags:
  - name: generation
    description: Create new images
  - name: analysis
    description: Analyse existing images
  - name: editing
    description: Edit existing images
  - name: catalog
    description: Browse presets and history

paths:
  /tools/generate_image:
    post:
      operationId: generate_image
      tags: [generation]
      summary: Generate a new image from a text or JSON prompt
      description: |
        Creates a new PNG image using Google Gemini. Accepts a plain-text natural language
        prompt or a structured JSON prompt following the Nano Banana schema. Optionally applies
        a named preset that sets platform-appropriate dimensions and conventions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageInput"
            examples:
              text_prompt:
                summary: Simple text prompt with preset
                value:
                  prompt: "Professional woman in a modern office, warm lighting"
                  preset: "facebook_ad"
                  model: "flash"
              json_prompt:
                summary: Structured JSON prompt
                value:
                  prompt: |
                    {
                      "subject": [{"type": "person", "description": "Young woman, short black hair"}],
                      "scene": {"location": "rooftop at sunset"},
                      "style_modifiers": {"medium": "photography", "aesthetic": ["cinematic"]}
                    }
                  prompt_format: "json"
                  aspect_ratio: "16:9"
                  image_size: "2K"
                  model: "pro"
              with_reference:
                summary: Generate with reference images for consistency
                value:
                  prompt: "Same person, now on a tropical beach"
                  reference_images: ["/output/hero.png"]
                  output_name: "hero-beach"
      responses:
        "200":
          description: Image generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateImageResponse"
        "400":
          description: Invalid input (bad JSON prompt, unknown preset, unreadable reference image)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Gemini API error or generation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/decompose_image:
    post:
      operationId: decompose_image
      tags: [analysis]
      summary: Decompose an image into a structured JSON blueprint
      description: |
        Sends an existing image to Gemini and asks it to output a structured JSON description
        of every visual component (subjects, scene, lighting, composition, style). The returned
        blueprint is cached as `{image_name}.blueprint.json` and is automatically picked up by
        `edit_image` when performing JSON edits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecomposeImageInput"
            examples:
              default:
                summary: Detailed decomposition (default)
                value:
                  image_path: "/output/hero.png"
              exhaustive:
                summary: Full exhaustive breakdown
                value:
                  image_path: "/output/hero.png"
                  detail_level: "exhaustive"
      responses:
        "200":
          description: Blueprint extracted and cached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecomposeImageResponse"
        "400":
          description: Image path not found or unreadable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Gemini API error or unparseable response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/edit_image:
    post:
      operationId: edit_image
      tags: [editing]
      summary: Edit an existing image using JSON changes or a natural language instruction
      description: |
        Two editing modes:

        **JSON mode** (`edit_type: "json"`) — Provide a `changes` object with dot-notation
        paths (e.g. `"subject[0].hair.color": "platinum_blonde"`). The tool merges these into
        the cached or provided blueprint and sends a precise prompt to Gemini instructing it to
        change only the listed fields while preserving everything else.

        **Natural language mode** (`edit_type: "natural_language"`) — Provide a plain-text
        `instruction`. If a blueprint exists for the image it is included as context so Gemini
        can preserve unchanged elements more accurately.

        The edited image is saved as `{original_name}-edit-{n}.png`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditImageInput"
            examples:
              json_edit:
                summary: JSON — change hair color and add accessory
                value:
                  image_path: "/output/hero.png"
                  edit_type: "json"
                  changes:
                    "subject[0].hair.color": "platinum_blonde"
                    "subject[0].accessories":
                      - item: "sunglasses"
                        material: "metal"
                        color: "gold"
                        location: "face"
              nl_edit:
                summary: Natural language — complex scene change
                value:
                  image_path: "/output/hero.png"
                  edit_type: "natural_language"
                  instruction: "Change the background to a tropical beach at sunset. Keep the person exactly the same."
      responses:
        "200":
          description: Image edited and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditImageResponse"
        "400":
          description: |
            Validation error — e.g. `edit_type` is `"json"` but no `changes` provided,
            or `edit_type` is `"natural_language"` but no `instruction` provided,
            or image not found, or no blueprint available for JSON edit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Gemini API error or edit failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/get_presets:
    post:
      operationId: get_presets
      tags: [catalog]
      summary: List available asset presets with dimensions and tips
      description: |
        Returns all named presets loaded from `presets.json`. Each preset provides a
        platform-appropriate `aspect_ratio`, `recommended_size`, pixel dimensions, and
        usage tips. Pass the preset `name` to `generate_image` to apply its settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetPresetsInput"
            examples:
              all:
                summary: All presets
                value:
                  category: "all"
              ad_only:
                summary: Advertising presets only
                value:
                  category: "ad"
      responses:
        "200":
          description: Filtered preset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPresetsResponse"

  /tools/list_generated:
    post:
      operationId: list_generated
      tags: [catalog]
      summary: Browse previously generated images
      description: |
        Scans the output directory for PNG files and returns metadata, blueprint availability,
        and edit-chain history. Supports keyword filtering by filename and optional inclusion
        of full blueprint JSON for each matching image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListGeneratedInput"
            examples:
              all:
                summary: All recent images
                value:
                  limit: 20
              filtered:
                summary: Filter by name with blueprints
                value:
                  filter: "hero"
                  limit: 10
                  include_blueprints: true
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGeneratedResponse"

components:
  schemas:

    # ── Input schemas ──────────────────────────────────────────────────────────

    GenerateImageInput:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Natural language description OR stringified JSON prompt.
          example: "Professional woman in a modern office, warm golden hour lighting"
        prompt_format:
          type: string
          enum: [text, json]
          default: text
          description: Whether the prompt is plain text or structured JSON.
        preset:
          type: string
          description: |
            Named preset (e.g. `facebook_ad`, `hero_image`, `og_image`). Sets
            `aspect_ratio` and `image_size` unless those are provided explicitly.
          example: facebook_ad
        aspect_ratio:
          type: string
          description: "Aspect ratio override. Examples: `16:9`, `1:1`, `9:16`, `4:3`, `21:9`."
          example: "16:9"
        image_size:
          type: string
          enum: ["1K", "2K", "4K"]
          description: Output resolution. Defaults to preset value or `1K`.
        model:
          type: string
          enum: [flash, pro]
          default: flash
          description: "`flash` = Gemini 3.1 Flash (fast). `pro` = Gemini 3 Pro (best quality)."
        reference_images:
          type: array
          items:
            type: string
          description: File paths to reference images sent inline for character/object consistency.
          example: ["/output/brand-character.png"]
        output_name:
          type: string
          description: Custom filename without extension. Auto-generated if omitted.
          example: hero-office
        enable_search_grounding:
          type: boolean
          default: false
          description: Use Google Search grounding for real-world accuracy.

    DecomposeImageInput:
      type: object
      required: [image_path]
      properties:
        image_path:
          type: string
          description: Absolute path to the image to decompose.
          example: /output/hero.png
        detail_level:
          type: string
          enum: [basic, detailed, exhaustive]
          default: detailed
          description: |
            Controls decomposition depth:
            - `basic` — subject, scene, composition (~10 fields)
            - `detailed` — all major sections (~30 fields)
            - `exhaustive` — every field including camera, film stock, hex colors (~60+ fields)

    EditImageInput:
      type: object
      required: [image_path, edit_type]
      properties:
        image_path:
          type: string
          description: Absolute path to the image to edit.
          example: /output/hero.png
        edit_type:
          type: string
          enum: [json, natural_language]
          description: |
            How the edit is expressed. Use `json` for precise field-level changes;
            use `natural_language` for complex or abstract scene transformations.
        changes:
          type: object
          additionalProperties: true
          description: |
            Required when `edit_type` is `"json"`. Object with dot-notation paths as keys
            and the new values as values.
          example:
            "subject[0].hair.color": "platinum_blonde"
            "scene.lighting.type": "studio_softbox"
        instruction:
          type: string
          description: |
            Required when `edit_type` is `"natural_language"`. Plain-text edit instruction.
          example: "Change the background to a tropical beach at sunset. Keep the person the same."
        blueprint:
          type: object
          additionalProperties: true
          description: |
            Full JSON blueprint (from `decompose_image`). If omitted, the tool loads the cached
            `.blueprint.json` for the image. Only relevant for JSON edits; natural language
            edits use it as context if available.
        preserve_style:
          type: boolean
          default: true
          description: When true, the prompt explicitly instructs Gemini to keep unchanged elements identical.
        model:
          type: string
          enum: [flash, pro]
          default: flash
          description: Model to use for the edit.
        output_name:
          type: string
          description: Custom filename for the edited image. Auto-incremented if omitted.

    GetPresetsInput:
      type: object
      properties:
        category:
          type: string
          enum: [ad, web, social, print, all]
          default: all
          description: Filter presets by category. Omit or pass `all` to return everything.

    ListGeneratedInput:
      type: object
      properties:
        filter:
          type: string
          description: Search term matched against filenames.
          example: hero
        limit:
          type: integer
          default: 20
          description: Maximum number of results to return.
        include_blueprints:
          type: boolean
          default: false
          description: When true, the full blueprint JSON is included for each image that has one.

    # ── Response schemas ───────────────────────────────────────────────────────

    GenerateImageResponse:
      type: object
      properties:
        image_path:
          type: string
          description: Absolute path to the saved PNG.
          example: /output/hero-office.png
        model_used:
          type: string
          example: gemini-3.1-flash-image-preview
        aspect_ratio:
          type: string
          example: "16:9"
        resolution:
          type: string
          example: "1K"
        preset_applied:
          type: string
          example: facebook_ad
        prompt_used:
          type: string
          description: First 500 characters of the effective prompt.
        description:
          type: string
          description: Text description returned by the model alongside the image.

    DecomposeImageResponse:
      type: object
      properties:
        image_path:
          type: string
          example: /output/hero.png
        blueprint:
          $ref: "#/components/schemas/Blueprint"

    EditImageResponse:
      type: object
      properties:
        original_path:
          type: string
          example: /output/hero.png
        edited_path:
          type: string
          example: /output/hero-edit-1.png
        edit_type:
          type: string
          enum: [json, natural_language]
        changes_applied:
          type: array
          items:
            type: string
          description: Dot-notation paths that were changed (JSON edits only).
          example: ["subject[0].hair.color", "subject[0].accessories"]
        model_used:
          type: string
          example: gemini-3.1-flash-image-preview
        description:
          type: string
          description: Text description returned by the model.

    GetPresetsResponse:
      type: object
      properties:
        presets:
          type: array
          items:
            $ref: "#/components/schemas/Preset"
        total:
          type: integer
          example: 10

    ListGeneratedResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageEntry"
        total:
          type: integer
          example: 5

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required: [error]

    # ── Shared / nested schemas ────────────────────────────────────────────────

    Preset:
      type: object
      properties:
        name:
          type: string
          example: facebook_ad
        category:
          type: string
          enum: [ad, web, social, print]
          example: ad
        display_name:
          type: string
          example: Facebook Ad Creative
        aspect_ratio:
          type: string
          example: "1:1"
        recommended_size:
          type: string
          enum: ["1K", "2K", "4K"]
          example: "1K"
        dimensions_px:
          type: string
          example: "1080x1080"
        tips:
          type: array
          items:
            type: string
          example:
            - "Keep text under 20% of image area"
            - "Use bright, contrasting colors"
        best_for:
          type: string
          example: "Facebook/Instagram feed ads"

    ImageEntry:
      type: object
      properties:
        path:
          type: string
          example: /output/hero.png
        name:
          type: string
          example: hero.png
        created_at:
          type: string
          format: date-time
          example: "2026-03-22T10:30:00Z"
        size_bytes:
          type: integer
          example: 2048000
        has_blueprint:
          type: boolean
          example: true
        edit_history:
          type: array
          items:
            type: string
          example: ["hero-edit-1.png", "hero-edit-2.png"]
        metadata:
          $ref: "#/components/schemas/ImageMetadata"
        blueprint:
          $ref: "#/components/schemas/Blueprint"
          description: Only present when `include_blueprints` is true and a blueprint exists.

    ImageMetadata:
      type: object
      properties:
        model:
          type: string
          example: flash
        prompt:
          type: string
          description: First 500 characters of the original prompt.
        prompt_format:
          type: string
          enum: [text, json]
        preset:
          type: string
          nullable: true
          example: hero_image
        aspect_ratio:
          type: string
          nullable: true
        image_size:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Blueprint:
      type: object
      description: |
        Structured JSON description of an image's visual components following the
        Nano Banana schema. All fields are optional — depth depends on `detail_level`.
      properties:
        subject:
          type: array
          items:
            $ref: "#/components/schemas/Subject"
        scene:
          $ref: "#/components/schemas/Scene"
        technical:
          $ref: "#/components/schemas/Technical"
        composition:
          $ref: "#/components/schemas/Composition"
        text_rendering:
          $ref: "#/components/schemas/TextRendering"
        style_modifiers:
          $ref: "#/components/schemas/StyleModifiers"
        meta:
          $ref: "#/components/schemas/Meta"

    Subject:
      type: object
      properties:
        id:
          type: string
          example: person_1
        type:
          type: string
          example: person
        description:
          type: string
        hair:
          type: object
          properties:
            style:
              type: string
              example: pixie_cut
            color:
              type: string
              example: jet_black
        expression:
          type: string
          example: smiling
        clothing:
          type: array
          items:
            type: object
            properties:
              item:
                type: string
              color:
                type: string
              fabric:
                type: string
              fit:
                type: string
        accessories:
          type: array
          items:
            type: object
        position:
          type: string
          example: center
        pose:
          type: string
          example: "standing, arms crossed"

    Scene:
      type: object
      properties:
        location:
          type: string
          example: modern office with glass walls
        time:
          type: string
          example: golden_hour
        weather:
          type: string
        lighting:
          type: object
          properties:
            type:
              type: string
              example: natural_sunlight
            direction:
              type: string
              example: side_lit
        background_elements:
          type: array
          items:
            type: string
          example: ["potted plants", "whiteboard with diagrams"]

    Technical:
      type: object
      properties:
        camera_model:
          type: string
        lens:
          type: string
          example: 50mm
        aperture:
          type: string
          example: f/2.8
        shutter_speed:
          type: string
        iso:
          type: string
        film_stock:
          type: string
          example: Fujifilm Pro 400H

    Composition:
      type: object
      properties:
        framing:
          type: string
          example: medium_shot
        angle:
          type: string
          example: eye_level
        focus_point:
          type: string
          example: face

    TextRendering:
      type: object
      properties:
        enabled:
          type: boolean
          example: false
        text_content:
          type: string
        placement:
          type: string
        font_style:
          type: string
        color:
          type: string

    StyleModifiers:
      type: object
      properties:
        medium:
          type: string
          example: photography
        aesthetic:
          type: array
          items:
            type: string
          example: [minimalist, cinematic]
        artist_reference:
          type: string

    Meta:
      type: object
      properties:
        aspect_ratio:
          type: string
          example: "16:9"
        quality:
          type: string
          example: ultra_photorealistic
        seed:
          type: integer
        guidance_scale:
          type: number
